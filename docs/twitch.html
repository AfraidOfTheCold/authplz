<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Twitch</title>
    </head>
    <body>
        <p>This is a simple HTML page deployed on Github Pages.</p>
        <script>
            let u = new URL(location);
            let p = u.searchParams;
            let s = JSON.parse(atob(p.get("state")))
            let from = s?.from;
            let port = s?.port || "";
            document.body.innerHTML = `<a href="http://${from}${port}/auth/twitch?${p.toString()}">finish</a>`;
        </script>
    </body>
</html>
